<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>task-map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }

    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 50px;
      background: rgba(26,26,46,0.97); backdrop-filter: blur(8px);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
      z-index: 200; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #toolbar h1 { font-size: 1.1rem; color: white; letter-spacing: 0.05em; }
    .tb-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
    .tb-spacer { flex: 1; }
    .tb-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; transition: background 0.15s; white-space: nowrap;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.2); }
    #statusBadge {
      font-size: 0.75rem; padding: 3px 10px; border-radius: 20px;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; gap: 5px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .dot.spin { background: none; border: 2px solid currentColor; border-top-color: transparent; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ヘッダー行（ロール名・固定） */
    #header-row {
      position: fixed; top: 50px; left: 0; right: 0; height: 56px;
      background: rgba(240,240,237,0.96); backdrop-filter: blur(6px);
      border-bottom: 1px solid #d8d8d4;
      z-index: 150; overflow: hidden; pointer-events: none;
    }
    .role-pill {
      position: absolute; top: 10px; height: 36px; width: 140px;
      border-radius: 18px; border: 2px solid #4a9d96;
      background: white; color: #2e7a74;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      text-align: center; line-height: 1.3; white-space: pre;
    }

    /* ボード */
    #board-wrap {
      position: fixed; top: 106px; left: 0; right: 0; bottom: 0;
      overflow: hidden; cursor: grab; user-select: none;
      background-color: #efefec;
      background-image: radial-gradient(circle, #c4c4c0 1px, transparent 1px);
      background-size: 20px 20px;
    }
    #board-wrap.grabbing { cursor: grabbing; }
    #board { position: absolute; top: 0; left: 0; transform-origin: 0 0; }

    /* タスクカード */
    .tcard {
      position: absolute; background: white;
      border-radius: 8px; border: 2px solid #4a9d96;
      padding: 7px 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      cursor: pointer; overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .tcard:hover { box-shadow: 0 4px 14px rgba(74,157,150,0.25); z-index: 50 !important; }
    .tcard .ct { font-size: 11px; font-weight: 600; color: #1a3a38; line-height: 1.4; }
    .tcard .cp { font-size: 9px; color: #999; margin-top: 3px; line-height: 1.4; }

    /* セクション区切り */
    .sec-divider {
      position: absolute; display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 700; color: #aaa;
      pointer-events: none; white-space: nowrap;
    }
    .sec-line {
      position: absolute; background: #d8d8d4;
      pointer-events: none;
    }

    /* 詳細パネル */
    #detail {
      position: fixed; right: 16px; top: 122px; width: 260px;
      background: white; border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      padding: 18px; z-index: 300; display: none;
      border-top: 3px solid #4a9d96;
    }
    #detail-close { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #bbb; }
    #detail h3 { font-size: 0.95rem; color: #1a3a38; margin-bottom: 4px; line-height: 1.4; padding-right: 20px; }
    .d-section { font-size: 0.75rem; color: #aaa; margin-bottom: 12px; }
    .d-row { margin-bottom: 8px; }
    .d-label { font-size: 0.7rem; color: #bbb; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .d-val { font-size: 0.85rem; color: #333; }
    .d-note { font-size: 0.82rem; color: #666; line-height: 1.6; }

    /* オーバーレイ */
    #overlay {
      position: fixed; inset: 50px 0 0 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 400; background: #efefec;
    }
    .spinner { width: 36px; height: 36px; border: 3px solid #ddd; border-top-color: #4a9d96; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
    #overlay p { color: #888; font-size: 0.9rem; }
    .err-box { background: white; border-radius: 12px; padding: 24px; max-width: 440px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); line-height: 1.8; font-size: 0.88rem; color: #444; }
    .err-box strong { display: block; margin-bottom: 8px; font-size: 1rem; }
    .err-box code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 0.82rem; word-break: break-all; }
  </style>

<body>

<div id="toolbar">
  <h1>📋 task-map</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="fitView()">全体表示</button>
  <button class="tb-btn" onclick="doZoomBtn(1.25)">＋</button>
  <button class="tb-btn" onclick="doZoomBtn(0.8)">－</button>
  <button class="tb-btn" onclick="loadData(true)" title="強制更新">↻</button>
  <div class="tb-spacer"></div>
  <div id="statusBadge"><span class="dot spin" id="sDot"></span><span id="sTxt">読み込み中...</span></div>
</div>

<div id="header-row"></div>
<div id="board-wrap"><div id="board"></div></div>

<div id="overlay">
  <div class="spinner"></div>
  <p>データを読み込み中...</p>
</div>

<div id="detail">
  <button id="detail-close" onclick="closeDetail()">×</button>
  <h3 id="d-title"></h3>
  <div class="d-section" id="d-section"></div>
  <div class="d-row"><div class="d-label">◎ 主担当</div><div class="d-val" id="d-primary"></div></div>
  <div class="d-row"><div class="d-label">○ 支援</div><div class="d-val" id="d-support"></div></div>
  <div class="d-row" id="d-note-row"><div class="d-label">メモ</div><div class="d-note" id="d-note"></div></div>
</div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbwhOvw4xINmgtzSKBJBI1FkfdGmhlnRGU9djtF1pl-iiGBbk9E5KaC59RIe4avVFtiH/exec';
const CACHE_KEY = 'taskmap_v3';
const TTL_MS    = 30 * 60 * 1000;

const COL_W      = 160;
const COL_GAP    = 24;
const CARD_W     = 148;
const CARD_H     = 48;
const ROW_H      = 68;
const SEC_HDR_H  = 28;
const SEC_HDR_MB = 10;
const PAD_T      = 12;
const PAD_L      = 16;
const PAD_B      = 60;
const PAD_R      = 40;

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function setStatus(color,text,spin=false){
  document.getElementById('sTxt').textContent=text;
  document.getElementById('sDot').className='dot'+(spin?' spin':'');
  document.getElementById('statusBadge').style.color=color;
}
function getCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY));}catch{return null;}}
function putCache(obj){try{localStorage.setItem(CACHE_KEY,JSON.stringify(obj));}catch{}}

let DATA=null, fetching=false;

async function loadData(force=false){
  if(force) fetching=false;
  if(fetching) return;
  const cache=getCache();
  if(cache&&!force&&Date.now()-cache.fetchedAt<TTL_MS){
    DATA=cache.data; setStatus('#6ee7b7','キャッシュ'); boot(); return;
  }
  if(cache&&!force){ DATA=cache.data; boot(); setStatus('rgba(255,255,255,0.7)','確認中...',true); }
  fetching=true;
  try{
    const res=await fetch(GAS_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA=await res.json();
    putCache({data:DATA,fetchedAt:Date.now()});
    setStatus('#6ee7b7','更新済み');
    boot();
  }catch(e){
    if(!cache){
      document.getElementById('overlay').style.display='flex';
      document.getElementById('overlay').innerHTML=`<div class="err-box"><strong>⚠️ データ取得失敗</strong><br><code>${GAS_URL}</code><br><br>${e.message}</div>`;
      setStatus('#fca5a5','読み込み失敗');
    }else{ setStatus('#fca5a5','オフライン'); }
  }finally{ fetching=false; }
}

// ── ヘッダーピルのX位置更新 ──
function updateHeaders(){
  document.querySelectorAll('.role-pill').forEach((pill,ri)=>{
    const colCenterX=tx+(PAD_L+ri*(COL_W+COL_GAP)+COL_W/2)*sc;
    pill.style.left=(colCenterX-70)+'px'; // 70 = pill width(140) / 2
  });
}

// ── ズーム / パン ──
let sc=1,tx=0,ty=0;
const wrap=document.getElementById('board-wrap');
const board=document.getElementById('board');
function applyT(){board.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;updateHeaders();}
function zoom(f,cx,cy){const ns=clamp(sc*f,0.03,8);tx=cx-(cx-tx)*ns/sc;ty=cy-(cy-ty)*ns/sc;sc=ns;applyT();}
function doZoomBtn(f){const r=wrap.getBoundingClientRect();zoom(f,r.width/2,r.height/2);}
wrap.addEventListener('wheel',e=>{e.preventDefault();const r=wrap.getBoundingClientRect();zoom(e.deltaY<0?1.06:1/1.06,e.clientX-r.left,e.clientY-r.top);},{passive:false});

// 保存進捗
let saveTotal=0,saveDone=0;
function updateSaveStatus(){
  if(saveTotal===0) return;
  if(saveDone<saveTotal) setStatus('#f59e0b',`保存中... ${saveDone}/${saveTotal}`,true);
  else{ setStatus('#6ee7b7',`保存完了 ${saveTotal}件 ✓`); setTimeout(()=>{saveTotal=0;saveDone=0;setStatus('#6ee7b7','保存済み');},2000); }
}
async function saveCardPos(key,left,top){
  saveTotal++; updateSaveStatus();
  try{ await fetch(`${GAS_URL}?action=save&key=${encodeURIComponent(key)}&left=${left}&top=${top}`); }
  catch(e){ console.warn('save failed',e); setStatus('#fca5a5','保存失敗'); }
  finally{ saveDone++; updateSaveStatus(); }
}
function cardKey(sec,title){return `${sec}__${title}`;}

// パン・カードドラッグ
let drag=false,mx0,my0,tx0,ty0,cardDrag=null;
wrap.addEventListener('mousedown',e=>{if(e.target.closest('.tcard'))return;drag=true;mx0=e.clientX;my0=e.clientY;tx0=tx;ty0=ty;wrap.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{
  if(drag){tx=tx0+(e.clientX-mx0);ty=ty0+(e.clientY-my0);applyT();}
  if(cardDrag){
    const dx=(e.clientX-cardDrag.sx)/sc,dy=(e.clientY-cardDrag.sy)/sc;
    if(Math.abs(dx)>3||Math.abs(dy)>3) cardDrag.moved=true;
    if(cardDrag.moved){
      cardDrag.el.style.left=(cardDrag.ox+dx)+'px';
      cardDrag.el.style.top=(cardDrag.oy+dy)+'px';
      cardDrag.el.style.zIndex=1000;
      cardDrag.el.style.boxShadow='0 8px 24px rgba(74,157,150,0.3)';
    }
  }
});
window.addEventListener('mouseup',()=>{
  drag=false; wrap.classList.remove('grabbing');
  if(cardDrag){
    if(cardDrag.moved){
      const left=parseFloat(cardDrag.el.style.left),top=parseFloat(cardDrag.el.style.top);
      cardDrag.el.style.boxShadow='';
      saveCardPos(cardDrag.key,left,top);
      if(DATA.positions) DATA.positions[cardDrag.key]={left,top};
      putCache({data:DATA,fetchedAt:Date.now()});
    }else{ showDetail(cardDrag.task,cardDrag.sectionTitle); }
    cardDrag=null;
  }
});

// タッチ
let tpts={},pinch0=null,ppan=null;
wrap.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)tpts[t.identifier]=[t.clientX,t.clientY];const ids=Object.keys(tpts);if(ids.length===1){const[cx,cy]=tpts[ids[0]];ppan={cx,cy,tx0:tx,ty0:ty};}else if(ids.length>=2){const[a,b]=ids.slice(0,2).map(id=>tpts[id]);const r=wrap.getBoundingClientRect();pinch0={d:Math.hypot(b[0]-a[0],b[1]-a[1]),sc0:sc,tx0:tx,ty0:ty,mx:(a[0]+b[0])/2-r.left,my:(a[1]+b[1])/2-r.top};ppan=null;}},{passive:false});
wrap.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)tpts[t.identifier]=[t.clientX,t.clientY];const ids=Object.keys(tpts);if(ids.length===1&&ppan){const[cx,cy]=tpts[ids[0]];tx=ppan.tx0+cx-ppan.cx;ty=ppan.ty0+cy-ppan.cy;applyT();}else if(ids.length>=2&&pinch0){const[a,b]=ids.slice(0,2).map(id=>tpts[id]);const d=Math.hypot(b[0]-a[0],b[1]-a[1]);const ns=clamp(pinch0.sc0*d/pinch0.d,0.03,8);tx=pinch0.mx-(pinch0.mx-pinch0.tx0)*ns/pinch0.sc0;ty=pinch0.my-(pinch0.my-pinch0.ty0)*ns/pinch0.sc0;sc=ns;applyT();}},{passive:false});
wrap.addEventListener('touchend',e=>{for(const t of e.changedTouches)delete tpts[t.identifier];pinch0=null;const ids=Object.keys(tpts);if(ids.length===1)ppan={cx:tpts[ids[0]][0],cy:tpts[ids[0]][1],tx0:tx,ty0:ty};},{passive:false});

// 詳細パネル
function showDetail(task,sectionTitle){
  document.getElementById('d-title').textContent=task.title;
  document.getElementById('d-section').textContent=sectionTitle;
  document.getElementById('d-primary').textContent=task.primary.join('、')||'—';
  document.getElementById('d-support').textContent=task.support.join('、')||'—';
  document.getElementById('d-note').textContent=task.note;
  document.getElementById('d-note-row').style.display=task.note?'block':'none';
  document.getElementById('detail').style.display='block';
}
function closeDetail(){document.getElementById('detail').style.display='none';}

// ── ボード構築 ──
function fitView(){
  if(!DATA||!DATA.roles) return;
  const vw=wrap.clientWidth,vh=wrap.clientHeight;
  const bw=PAD_L+DATA.roles.length*(COL_W+COL_GAP)-COL_GAP+PAD_R;
  let bh=PAD_T;
  (DATA.sections||[]).forEach(s=>{bh+=SEC_HDR_H+SEC_HDR_MB+s.tasks.length*ROW_H;});
  bh+=PAD_B;
  sc=Math.min(vw/bw,vh/bh)*0.93;
  tx=(vw-bw*sc)/2; ty=0;
  applyT();
}

function boot(){
  document.getElementById('overlay').style.display='none';
  if(!DATA||!DATA.sections||!DATA.sections.length){
    document.getElementById('overlay').style.display='flex';
    document.getElementById('overlay').innerHTML='<div class="err-box"><strong>データがありません</strong></div>';
    return;
  }
  const roles=DATA.roles||[];
  const positions=DATA.positions||{};
  const totalColW=roles.length*(COL_W+COL_GAP)-COL_GAP;

  // ヘッダーピル生成
  const headerRow=document.getElementById('header-row');
  headerRow.innerHTML='';
  roles.forEach(role=>{
    const pill=document.createElement('div');
    pill.className='role-pill';
    pill.textContent=role;
    headerRow.appendChild(pill);
  });

  // ボード
  board.innerHTML='';
  let curY=PAD_T;

  DATA.sections.forEach(sec=>{
    // セクション区切り線＋ラベル
    const line=document.createElement('div');
    line.className='sec-line';
    line.style.cssText=`left:${PAD_L}px;top:${curY+SEC_HDR_H/2}px;width:${totalColW}px;height:1px;`;
    board.appendChild(line);

    const label=document.createElement('div');
    label.className='sec-divider';
    label.style.cssText=`left:${PAD_L}px;top:${curY}px;height:${SEC_HDR_H}px;`;
    label.textContent=sec.title;
    board.appendChild(label);
    curY+=SEC_HDR_H+SEC_HDR_MB;

    // タスクカード
    sec.tasks.forEach(task=>{
      const ri=task.primary.length>0?roles.indexOf(task.primary[0]):-1;
      const colX=PAD_L+(ri>=0?ri*(COL_W+COL_GAP):roles.length*(COL_W+COL_GAP));
      const defaultX=colX+(COL_W-CARD_W)/2;
      const defaultY=curY+(ROW_H-CARD_H)/2;
      const key=cardKey(sec.title,task.title);
      const saved=positions[key];

      const el=document.createElement('div');
      el.className='tcard';
      el.style.cssText=`left:${saved?saved.left:defaultX}px;top:${saved?saved.top:defaultY}px;width:${CARD_W}px;`;
      const sup=task.support.length?`<div class="cp">○ ${task.support.join(' ')}</div>`:'';
      el.innerHTML=`<div class="ct">${task.title}</div>${sup}`;
      el.addEventListener('mousedown',e=>{
        e.stopPropagation();
        cardDrag={el,task,sectionTitle:sec.title,key,sx:e.clientX,sy:e.clientY,ox:parseFloat(el.style.left),oy:parseFloat(el.style.top),moved:false};
      });
      el.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();showDetail(task,sec.title);},{passive:false});
      board.appendChild(el);
      curY+=ROW_H;
    });
  });

  fitView();
  updateHeaders();
}

loadData();
</script>
</body>
</html>
